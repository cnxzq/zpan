<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZPan v__VERSION__</title>
  <!-- <script src="./vue.global.js"></script>
  <script src="./vue-router.global.js"></script> -->
  <link rel="stylesheet" href="./styles.css">

  <script type="importmap">
  {
    "imports": {
      "vue": "./lib/vue.esm-browser.js",
      "vue-router": "./lib/vue-router.esm-browser.js",
      "pinia": "./lib/pinia.esm-browser.js",
      "@vue/devtools-api": "./lib/vue-devtools-api.esm-browser.js",
      "axios": "./lib/axios.js",

      "@/router": "./router/index.js",
      "@/store": "./store/index.js",
      "@/store/auth": "./store/auth.js",
      "@/store/app": "./store/app.js",
      "@/store/upload": "./store/upload.js",
      "@/api/client": "./api/client.js",
      "@/api/auth": "./api/auth.js",
      "@/api/config": "./api/config.js",
      "@/api/upload": "./api/upload.js",
      "@/components/breadcrumbs": "./components/breadcrumbs.js",
      "@/components/app-header": "./components/app-header.js",
      "@/components/upload-modal": "./components/upload-modal.js",
      "@/components/login-modal": "./components/login-modal.js",
      "@/views/user-management-page": "./views/user-management-page.js",
      "@/views/file-browser": "./views/file-browser.js",
      "@/util": "./util/index.js",
      "@/utils": "./utils/index.js"
    }
  }
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module">
    import { createApp, defineComponent, defineAsyncComponent, onMounted, computed } from 'vue';
    import * as VueRouter from 'vue-router';
    import { createPinia } from 'pinia';
    import { router } from '@/router'
    import { useAuthStore } from '@/store/auth';
    import { useAppStore } from '@/store/app';
    import { useUploadStore } from '@/store/upload';
    import AppHeader from '@/components/app-header';
    import UploadModal from '@/components/upload-modal';

    const { useRoute, useRouter } = VueRouter;

    // 组件 - 登录弹窗（异步加载）
    const LoginModal = defineAsyncComponent(() =>
      import('./components/login-modal.js')
    );

    // 根组件
    const App = defineComponent({
      name: 'App',
      components: {
        AppHeader,
        LoginModal,
        UploadModal,
      },
      setup() {
        const route = useRoute();
        const router = useRouter();

        // 使用 Pinia stores
        const authStore = useAuthStore();
        const appStore = useAppStore();
        const uploadStore = useUploadStore();

        // Get current directory from route params for breadcrumb
        const currentDir = computed(() => {
          const match = route.path.match(/^\/([^\/].*)?$/);
          if (match && match[1]) {
            return decodeURIComponent(match[1]);
          }
          return '';
        });

        // 导航到指定目录
        function navigateTo(parts) {
          const path = parts.join('/');
          router.push('/' + encodeURIComponent(path));
        }

        // 返回文件列表
        function backToFiles() {
          router.push('/');
        }

        onMounted(async () => {
          await appStore.loadConfig();
          await authStore.checkAuth();
        });

        return {
          // State from stores
          layout: () => appStore.layout,
          currentDir,
          loggedIn: () => authStore.loggedIn,
          checkingAuth: () => authStore.checkingAuth,
          baseUrl: () => appStore.baseUrl,
          instanceName: () => appStore.instanceName,
          showLoginModal: () => authStore.showLoginModal,
          loginError: () => authStore.loginError,
          loggingIn: () => authStore.loggingIn,
          showUploadModal: () => uploadStore.showUploadModal,
          selectedFiles: () => uploadStore.selectedFiles,
          uploading: () => uploadStore.uploading,
          uploadError: () => uploadStore.uploadError,
          uploadSuccess: () => uploadStore.uploadSuccess,
          uploadedFiles: () => uploadStore.uploadedFiles,
          isAdmin: () => authStore.isAdmin,

          // Methods
          navigateTo,
          backToFiles,
          onLayoutChange: (val) => appStore.setLayout(val),
          handleLogin: (credentials) => authStore.login(credentials.username, credentials.password, route),
          handleLogout: () => authStore.logout(),
          openLoginModal: () => authStore.openLoginModal(),
          closeLoginModal: () => authStore.closeLoginModal(),
          openUploadModal: () => uploadStore.openUploadModal(),
          closeUploadModal: () => uploadStore.closeUploadModal(),
          handleFileSelect: (e) => uploadStore.handleFileSelect(e),
          removeFile: (index) => uploadStore.removeFile(index),
          handleUpload: () => uploadStore.handleUpload(currentDir.value),
          goToUsers: () => authStore.goToUsers(),
        };
      },
      template: `
        <div class="container">
          <AppHeader
            :logged-in="loggedIn()"
            :current-path="currentDir"
            :layout="layout()"
            :instance-name="instanceName()"
            :is-admin="isAdmin()"
            @layout-change="onLayoutChange"
            @open-upload="openUploadModal"
            @logout="handleLogout"
            @navigate="navigateTo"
            @go-to-users="goToUsers"
          />

          <router-view
            v-slot="{ Component }"
          >
            <component
              :is="Component"
              :logged-in="loggedIn()"
              :layout="layout()"
              :base-url="baseUrl()"
            />
          </router-view>

          <LoginModal
            :show="showLoginModal()"
            :error="loginError()"
            :loading="loggingIn()"
            @close="closeLoginModal"
            @login="handleLogin"
          />

          <UploadModal
            :show="showUploadModal()"
            :current-dir="currentDir"
            :selected-files="selectedFiles()"
            :uploading="uploading()"
            :error="uploadError()"
            :success="uploadSuccess()"
            :uploaded-count="uploadedFiles().length"
            @close="closeUploadModal"
            @file-select="handleFileSelect"
            @remove-file="removeFile"
            @upload="handleUpload"
          />
        </div>
      `,
    });

    // 创建应用
    const pinia = createPinia();
    // App 就是根布局，本身包含 <router-view>，不需要再嵌套
    createApp(App)
      .use(router)
      .use(pinia)
      .mount('#app');
  </script>
</body>

</html>
